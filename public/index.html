<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>SPC Member Assistant</title>
  <meta name="description" content="The Houston Livestock Show and Rodeo Souvenir Program Committee member assistant. Ask about forms, deadlines, ad ordering, and committee procedures, answered from the committee knowledge base." />
  <link rel="icon" href="logo.svg" />

  <!-- OpenGraph -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://hlsr-spc-assistant.vercel.app/" />
  <meta property="og:title" content="SPC Member Assistant" />
  <meta property="og:description" content="Ask about forms, deadlines, ad ordering, and committee procedures. Answered from the Souvenir Program Committee knowledge base." />
  <meta property="og:image" content="https://hlsr-spc-assistant.vercel.app/og.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="SPC Member Assistant" />
  <meta name="twitter:description" content="Ask about forms, deadlines, ad ordering, and committee procedures. Answered from the Souvenir Program Committee knowledge base." />
  <meta name="twitter:image" content="https://hlsr-spc-assistant.vercel.app/og.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <!-- Apply a saved theme override before paint, so there's no flash. -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('spc-theme');
        if (t === 'dark' || t === 'light') document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="app-header">
      <img class="logo" src="logo.svg" alt="Souvenir Program Committee" />
      <div class="app-title">
        <p class="app-name">Souvenir Program Committee</p>
        <p class="app-sub"><span class="dot"></span>Member Assistant</p>
      </div>
      <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle dark mode"></button>
      <button class="captain-btn" id="captain-open" type="button">Contact Admin</button>
    </header>

    <div class="chat-log" id="chat-log">
      <div class="msg bot">
        <div class="bubble">
          <p>Howdy! I'm the Souvenir Program Committee assistant. Ask me about forms, deadlines, ad ordering, or committee procedures and I'll answer from the committee knowledge base.</p>
        </div>
      </div>
      <div class="starters" id="starters">
        <button class="starter">What is the Advertiser Information Form?</button>
        <button class="starter">When is new artwork due?</button>
        <button class="starter">How do I place an ad order?</button>
      </div>
    </div>

    <form class="composer" id="composer">
      <input class="composer-input" id="composer-input" type="text" placeholder="Ask a question…" autocomplete="off" required />
      <button class="composer-send" type="submit" aria-label="Send">
        <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M3.4 20.4l17.45-7.48a1 1 0 000-1.84L3.4 3.6a1 1 0 00-1.39 1.2l2.1 6.28L14 12l-9.9.92-2.09 6.28a1 1 0 001.39 1.2z"/></svg>
      </button>
    </form>
  </div>

  <!-- Contact Admin -->
  <div class="modal" id="captain-modal" hidden>
    <div class="modal-overlay" id="captain-overlay"></div>
    <div class="sheet">
      <div class="sheet-head">
        <p class="sheet-title">Contact an administrator</p>
        <button class="sheet-close" id="captain-close" type="button" aria-label="Close">&times;</button>
      </div>

      <form class="cap-form" id="captain-form">
        <p class="hp"><label>Leave blank <input name="botcheck" id="cap-botcheck" tabindex="-1" autocomplete="off" /></label></p>
        <label class="field">
          <span>Your name</span>
          <input type="text" id="cap-name" placeholder="First and last name" required />
        </label>
        <label class="field">
          <span>Your message</span>
          <textarea id="cap-message" rows="3" placeholder="What would you like to ask a committee administrator?" required></textarea>
        </label>
        <label class="field">
          <span>Your email (optional, so we can reply)</span>
          <input type="email" id="cap-email" placeholder="you@example.com" />
        </label>
        <label class="check">
          <input type="checkbox" id="cap-transcript" checked />
          <span>Include this chat transcript</span>
        </label>
        <button class="btn-primary" type="submit">Send message</button>
      </form>

      <div class="cap-sent" id="captain-sent" hidden>
        <p class="cap-banner" id="cap-banner">Sent. A committee administrator will follow up.</p>
        <pre class="cap-preview" id="cap-preview"></pre>
        <button class="btn-primary" id="captain-done" type="button">Done</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
