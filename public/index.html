<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>SPC Member Assistant</title>
  <link rel="icon" href="logo.webp" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="app-header">
      <img class="logo" src="logo.webp" alt="Souvenir Program Committee" />
      <div class="app-title">
        <p class="app-name">Souvenir Program Committee</p>
        <p class="app-sub"><span class="dot"></span>Member Assistant</p>
      </div>
    </header>

    <div class="chat-log" id="chat-log">
      <div class="msg bot">
        <div class="bubble">
          <p>Howdy! I'm the Souvenir Program Committee assistant. Ask me about forms, deadlines, ad ordering, or committee procedures and I'll answer from the committee knowledge base.</p>
        </div>
      </div>
      <div class="starters" id="starters">
        <button class="starter">What is the Advertiser Information Form?</button>
        <button class="starter">When is new artwork due?</button>
        <button class="starter">How do I place an ad order?</button>
      </div>
    </div>

    <form class="composer" id="composer">
      <input class="composer-input" id="composer-input" type="text" placeholder="Ask a question…" autocomplete="off" required />
      <button class="composer-send" type="submit" aria-label="Send">
        <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M3.4 20.4l17.45-7.48a1 1 0 000-1.84L3.4 3.6a1 1 0 00-1.39 1.2l2.1 6.28L14 12l-9.9.92-2.09 6.28a1 1 0 001.39 1.2z"/></svg>
      </button>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
