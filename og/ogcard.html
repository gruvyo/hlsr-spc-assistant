<!DOCTYPE html>
<!--
  Source for public/og.png (the 1200x630 social-share card). Edit here, then
  re-render to public/og.png with headless Chrome:

    "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" \
      --headless=new --disable-gpu --hide-scrollbars --force-device-scale-factor=1 \
      --force-color-profile=srgb --virtual-time-budget=5000 --window-size=1200,630 \
      --screenshot="../public/og.png" "file://$PWD/ogcard.html"

  (run from this og/ directory; needs an internet connection for the Archivo font).
-->
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; }
  body {
    background: #231f20;
    font-family: "Archivo", system-ui, sans-serif;
    position: relative;
    overflow: hidden;
  }
  .topbar { position: absolute; top: 0; left: 0; width: 100%; height: 12px; background: #ee7624; }
  .beta {
    position: absolute; top: 46px; left: 56px;
    background: #ee7624; color: #231f20;
    font-weight: 800; font-size: 26px; letter-spacing: 0.14em;
    padding: 8px 22px 9px; border-radius: 999px;
    text-transform: uppercase;
  }
  .row {
    display: flex; align-items: center; gap: 54px;
    height: 100%; padding: 0 70px 0 90px;
  }
  .logo-card {
    flex-shrink: 0;
    width: 232px; height: 232px;
    background: #fefeff; border-radius: 30px;
    display: grid; place-items: center;
  }
  .logo-card img { width: 196px; height: 196px; object-fit: contain; }
  .text { display: flex; flex-direction: column; justify-content: center; }
  .title {
    color: #fefeff; font-weight: 800; font-size: 82px; line-height: 1.02;
    letter-spacing: -0.01em;
  }
  .sub {
    color: #f0e3ba; font-weight: 600; font-size: 44px;
    margin-top: 18px;
  }
</style>
</head>
<body>
  <div class="topbar"></div>
  <div class="beta">Beta</div>
  <div class="row">
    <div class="logo-card">
      <img src="../public/logo.svg" alt="">
    </div>
    <div class="text">
      <div class="title">Souvenir Program<br>Committee</div>
      <div class="sub">Member Assistant</div>
    </div>
  </div>
</body>
</html>
